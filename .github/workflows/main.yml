name: GIB Daily Insight Bot

on:
  schedule:
    - cron: '0 */8 * * *' # 每 8 小時跑一次 (UTC 時間)
  workflow_dispatch:      # 允許手動點擊按鈕執行

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允許 Actions 把處理過的 URL 存回 Repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install trafilatura google-genai feedparser requests

      - name: Run GIB Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          GAS_URL: ${{ secrets.GAS_URL }}
        run: python gib_industrial.py

      - name: Commit and push if database changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add processed_urls.json
          # 檢查是否有已暫存的變更需要提交，避免不必要的 commit 與 push
          if ! git diff --cached --quiet; then
            git commit -m "Update processed URLs database [skip ci]"
            # 使用 HEAD:分支名 推送，解決 Actions 在 detached HEAD 狀態下無法直接 push 的問題
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes in database to commit"
          fi
